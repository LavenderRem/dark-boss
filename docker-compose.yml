services:
  dark-boss:
    build: .
    container_name: dark-boss
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据（数据库文件）
      - dark-boss-data:/root/.dark-boss
      # 挂载项目目录（Agent 工作空间，按需修改路径）
      - ./workspace:/app/workspace
      # Claude Code 会话缓存
      - claude-cache:/root/.claude
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DATA_DIR=/root/.dark-boss
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Nginx 反向代理（可选，生产环境推荐）
  nginx:
    image: nginx:alpine
    container_name: dark-boss-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dark-boss:
        condition: service_healthy

volumes:
  dark-boss-data:
  claude-cache:
