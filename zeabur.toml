[_]
version = 2

[project]
name = "dark-boss"
region = "sin"

[build]
# Monorepo 模式下，Zeabur 会根据 packages 目录自动检测服务

# Server 服务配置
[build.services.server]
name = "dark-boss-api"
path = "packages/server"
buildCommand = "pnpm install --frozen-lockfile && pnpm build"
startCommand = "pnpm --filter @dark-boss/server dev"
healthCheck = "/health"

# Client 服务配置
[build.services.client]
name = "dark-boss-web"
path = "packages/client"
buildCommand = "pnpm install --frozen-lockfile && pnpm build"
startCommand = "pnpm --filter @dark-boss/client dev"
healthCheck = "/"
public = true

# 环境变量
[build.services.server.env]
NODE_ENV = "production"
PORT = "3001"

[build.services.client.env]
NODE_ENV = "production"
VITE_API_URL = "https://dark-boss-api.zeabur.app"
VITE_WS_URL = "wss://dark-boss-api.zeabur.app"
